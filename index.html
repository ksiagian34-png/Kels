<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Control System</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e4c7e;
  color:white;
  text-align:center;
}

.container {
  padding:40px 20px;
}

h1 {
  font-size:30px;
}

.btn {
  background:#00d4aa;
  padding:15px 25px;
  border-radius:10px;
  color:black;
  font-weight:bold;
  border:none;
  margin-top:20px;
}

.note {
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 AI CONTROL SYSTEM</h1>
<p>Tool Termux Multifungsi</p>

<p>🔥 Fitur:</p>
<p>AI • Booster • Launcher • Tracking • Admin Panel</p>

<button class="btn" onclick="install()">📥 Install Sekarang</button>

<p class="note" id="status">✔ Siap digunakan</p>
</div>

<script>
function install() {

  const cmd = "pkg update -y && pkg install curl -y && bash <(curl -s https://raw.githubusercontent.com/ksiagian34-png/Kels/main/install-online.sh)";

  navigator.clipboard.writeText(cmd).then(() => {
    document.getElementById("status").innerText = "✔ Command disalin! Buka Termux & paste";
  }).catch(() => {
    document.getElementById("status").innerText = "❌ Gagal copy!";
  });

  window.location.href = "termux://";
}
</script>

</body>
</html>
