<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Control System</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e3c72;
  background: linear-gradient(to bottom, #2a5298, #1e3c72);
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
}

h1 {
  font-size: 28px;
}

button {
  margin-top: 20px;
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #00e6a8;
  color: black;
  cursor: pointer;
}

button:hover {
  background: #00c896;
}

.note {
  margin-top: 15px;
  color: #ddd;
}
</style>
</head>

<body>

<div class="container">
  <h1>🤖 AI CONTROL SYSTEM</h1>
  <p>Tool Termux Multifungsi</p>

  <h3>🔥 Fitur:</h3>
  <p>AI • Booster • Launcher • Tracking • Admin Panel</p>

  <button onclick="install()">📦 Install Sekarang</button>

  <p class="note" id="status">✔ Siap digunakan</p>
</div>

<script>
function install() {
  const cmd = "pkg update -y && pkg install curl -y && bash <(curl -s https://raw.githubusercontent.com/ksiagian34-png/Kels/main/install-online.sh)";
  
  navigator.clipboard.writeText(cmd).then(() => {
    document.getElementById("status").innerText = "✔ Command disalin! Buka Termux lalu paste.";
  });

  // buka Termux (opsional)
  window.location.href = "termux://";
}
</script>

</body>
</html>
